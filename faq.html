 <h1 data-i18n="faq.title">Frequently Asked Questions</h1>
 <p class="subtitle" data-i18n="faq.subtitle">Everything you need to know about Minerva</p>

 <div class="category">
 <h2 class="category-title" data-i18n="faq.for_parents">For Parents & Students</h2>
 <div class="faq-list">
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p1_q">What subjects are available on Minerva?</div>
 <div class="faq-answer" data-i18n="faq.p1_a">We cover all major subjects: Academic (Math, English, Science, Chinese), Music (Piano, Violin, etc.), Languages (Cantonese, Mandarin, French, Spanish), Arts, and Sports. If you don't see what you need, contact us and we'll help find a suitable teacher.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p2_q">How do I book a lesson?</div>
 <div class="faq-answer" data-i18n="faq.p2_a">Simply browse our verified teachers, select one that matches your needs, and click "Book Lesson" on their profile. You'll fill in your preferred times and subjects, and our team will match you with the teacher. Payment is held securely in escrow until the lesson is complete.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p3_q">How does the free first lesson work?</div>
 <div class="faq-answer" data-i18n="faq.p3_a">When you sign up for four lessons with a teacher, your first lesson is completely free. This gives you a chance to meet the teacher, assess their teaching style, and make sure it's a good fit before committing to ongoing lessons.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p4_q">What is your cancellation policy?</div>
 <div class="faq-answer" data-i18n="faq.p4_a">Lessons cancelled 24+ hours in advance receive a full refund. Cancellations within 24 hours receive a 50% refund. If a teacher cancels, you receive a full refund automatically. We protect both parents and teachers from last-minute changes.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p5_q">What if I'm not satisfied with the teacher?</div>
 <div class="faq-answer" data-i18n="faq.p5_a">You can switch teachers at any time with no penalty. If you have concerns about a teacher, contact our support team and we'll help resolve the situation. We want to ensure every student finds the right match.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p6_q">How does online tutoring work?</div>
 <div class="faq-answer" data-i18n="faq.p6_a">Online lessons are conducted via video call (Zoom, Google Meet, or your preferred platform). The teacher shares a virtual lesson space where they can use screen sharing, digital whiteboards, and interactive tools. All online lessons are still covered by our escrow payment protection.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p7_q">What age groups do you serve?</div>
 <div class="faq-answer" data-i18n="faq.p7_a">We serve students from Primary 1 through to adults. Our teachers specialize in different age groups, from young children learning basics to DSE exam preparation to professional skill development.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.p8_q">Can I switch teachers if needed?</div>
 <div class="faq-answer" data-i18n="faq.p8_a">Absolutely. You're never locked into a single teacher. If you want to try someone different, simply book with another teacher. There are no penalties for switching, and we encourage students to find the best fit.</div>
 </div>
 </div>
 </div>

 <div class="category">
 <h2 class="category-title" data-i18n="faq.for_teachers">For Teachers</h2>
 <div class="faq-list">
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.t1_q">How much can I earn as a Minerva teacher?</div>
 <div class="faq-answer" data-i18n="faq.t1_a">You set your own rates based on your experience and specialization. Most teachers on Minerva charge HK$300-500/hour for academic subjects, and HK$280-450/hour for music and arts. Your earnings are direct — no hidden deductions beyond our transparent commission structure.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.t2_q">How do I get paid?</div>
 <div class="faq-answer" data-i18n="faq.t2_a">Payments are processed through Stripe and released to your account within 3 business days after lesson completion. All payments are held securely in escrow until both you and the student confirm the lesson went ahead.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.t3_q">What if a student cancels last minute?</div>
 <div class="faq-answer" data-i18n="faq.t3_a">If a student cancels within 24 hours, they receive a 50% refund and you keep 50% of the lesson fee as compensation. This protects you from lost income due to last-minute cancellations.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.t4_q">Do I need to bring my own materials?</div>
 <div class="faq-answer" data-i18n="faq.t4_a">You decide what works best for your teaching style. Many teachers use their own materials, worksheets, and textbooks. We also provide access to a shared resource library you can use. Students often have their own materials from school as well.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.t5_q">How does the 0% commission for first 4 classes work?</div>
 <div class="faq-answer" data-i18n="faq.t5_a">When you join as a teacher, your first four completed lessons have zero commission taken by Minerva. This means you keep 100% of what parents pay. After the fourth lesson, our standard commission rate applies (20-30% depending on subject and experience level).</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.t6_q">What verification process do I need to complete?</div>
 <div class="faq-answer" data-i18n="faq.t6_a">All teachers must complete our verification process: ID verification (HKID or passport), qualification checks, reference verification, and a short interview. This typically takes 2-3 days and ensures trust for parents and students.</div>
 </div>
 </div>
 </div>

 <div class="category">
 <h2 class="category-title" data-i18n="faq.general">General</h2>
 <div class="faq-list">
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.g1_q">Is my data protected?</div>
 <div class="faq-answer" data-i18n="faq.g1_a">Yes. Minerva is fully compliant with Hong Kong's Personal Data (Privacy) Ordinance (PDPO). Your personal information is encrypted and never shared with third parties without your consent. We use Stripe for payments, which is PCI-DSS compliant.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.g2_q">What's your refund policy?</div>
 <div class="faq-answer" data-i18n="faq.g2_a">We offer full transparency on refunds. Lessons cancelled 24+ hours in advance receive full refunds. Within 24 hours, 50% refund. Teacher no-shows result in full refunds to parents. Refunds are processed within 5 business days to your original payment method.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.g3_q">Where does Minerva operate?</div>
 <div class="faq-answer" data-i18n="faq.g3_a">We currently operate in Hong Kong, covering Hong Kong Island, Kowloon, and the New Territories. Online tutoring is available globally. We're planning expansion to other Asian cities in 2027.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.g4_q">How do I contact support?</div>
 <div class="faq-answer" data-i18n="faq.g4_a">You can reach us via email at support@minerva.hk or WhatsApp at +852 XXXX XXXX. Our team is available Monday to Saturday, 9am-6pm HKT. For urgent matters during lessons, we have emergency support available.</div>
 </div>
 <div class="faq-item">
 <div class="faq-question" data-i18n="faq.g5_q">What makes Minerva different from other tutoring platforms?</div>
 <div class="faq-answer" data-i18n="faq.g5_a">We're the first platform in Asia combining verified teachers, escrow payments, virtual scheduling, and AI-powered matching. Unlike agencies that take 40-60% commission, we charge 20-30%. Unlike casual platforms, we verify every teacher and protect both parents and teachers through our escrow system.</div>
 </div>
 </div>
 </div>

<script>
(function(){
  var sel = document.getElementById('langSelector');
  var globe = document.getElementById('langGlobe');
  var dropdown = document.getElementById('langDropdown');
  if (sel && globe && dropdown) {
    globe.addEventListener('click', function(e){
      e.stopPropagation();
      sel.classList.toggle('open');
    });
    document.addEventListener('click', function(){ sel.classList.remove('open'); });
    dropdown.addEventListener('click', function(e){ e.stopPropagation(); });
    dropdown.querySelectorAll('.lang-option').forEach(function(opt){
      opt.addEventListener('click', function(){
        dropdown.querySelectorAll('.lang-option').forEach(function(o){ o.classList.remove('selected'); });
        opt.classList.add('selected');
        sel.classList.remove('open');
        var lang = opt.dataset.lang;
        if (typeof setLanguage === 'function') setLanguage(lang);
      });
    });
  }
  var params = new URLSearchParams(window.location.search);
  var lp = params.get('lang');
  if (lp && typeof setLanguage === 'function') setLanguage(lp);
})();
</script>
