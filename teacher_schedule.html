<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>My Schedule - Minerva</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 <style>

 :root {
 --navy: #1e3a5f;
 --navy-dark: #0f1f33;
 --teal: #3b82f6;
 --gold: #F9A828;
 --gold-light: #FBB81C;
 --white: #ffffff;
 --gray-100: #f8fafc;
 --gray-200: #e2e8f0;
 --gray-300: #cbd5e1;
 --gray-400: #94a3b8;
 --gray-500: #64748b;
 --gray-600: #475569;
 --gray-700: #334155;
 --green: #22c55e;
 --red: #ef4444;
 --purple: #8b5cf6;
}

 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
 background: var(--gray-100);
 color: var(--gray-700);
 line-height: 1.6;
 }

 /* Nav */
 nav {
 background: var(--navy);
 color: white;
 padding: 16px 24px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 position: relative;
 z-index: 100;
 }

 .nav-left {
 display: flex;
 align-items: center;
 gap: 16px;
 }

 .logo {
 display: flex;
 align-items: center;
 gap: 10px;
 font-weight: 800;
 font-size: 20px;
 color: white;
 text-decoration: none;
 }

 .logo-icon { width: 32px; height: 32px; }

 .nav-right {
 display: flex;
 align-items: center;
 gap: 16px;
 flex-wrap: wrap;
 justify-content: flex-end;
 }

 .nav-links {
 display: flex;
 gap: 24px;
 margin-left: 32px;
 margin-right: auto;
 }

 .mobile-menu-btn {
 display: none;
 font-size: 24px;
 cursor: pointer;
 padding: 8px;
 color: white;
 background: none;
 border: none;
 }

 .nav-links a {
 color: rgba(255,255,255,0.7);
 text-decoration: none;
 font-size: 14px;
 font-weight: 500;
 transition: color 0.2s;
 }
 .nav-links a:hover { color: white; }
 .nav-links a.active { color: #F9A828 !important; }

 

 .user-info {
 display: flex;
 align-items: center;
 gap: 12px;
 }

 .avatar {
 width: 36px;
 height: 36px;
 background: var(--gold);
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 font-weight: 700;
 color: var(--navy-dark);
 font-size: 14px;
 }

 .user-name {
 font-size: 14px;
 font-weight: 600;
 }
