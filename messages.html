<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Messages — Minerva</title>
 <style>
/* === TOKENS === */
:root {
 --navy: #1e3a5f;
 --teal: #008C72;
 --gold: #F9A828;
 --white: #ffffff;
 --gray-50: #f8fafc;
 --gray-100: #f1f5f9;
 --gray-200: #e2e8f0;
 --gray-300: #cbd5e1;
 --gray-400: #94a3b8;
 --gray-500: #64748b;
 --gray-600: #475569;
 --gray-700: #334155;
 --gray-800: #1e293b;
 --gray-900: #0f172a;
 --green: #22c55e;
 --red: #ef4444;
 --chat-bg: #ECE5DD;
}

/* === RESET === */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
 background: var(--white);
 color: var(--gray-800);
 height: 100%;
 display: flex;
 flex-direction: column;
}

/* === NAV === */
nav {
 background: var(--navy);
 color: white;
 padding: 0 16px;
 display: flex;
 align-items: center;
 height: 60px;
 position: fixed;
 top: 0; left: 0; right: 0;
 z-index: 200;
 gap: 12px;
}
nav .back-btn {
 background: none;
 border: none;
 color: white;
 font-size: 24px;
 cursor: pointer;
 padding: 8px;
 margin-left: -8px;
 display: none;
}
nav .back-btn.visible { display: block; }
nav .nav-title {
 flex: 1;
 font-size: 17px;
 font-weight: 600;
 color: white;
}
.nav-avatar {
 width: 36px;
 height: 36px;
 border-radius: 50%;
 background: var(--gray-300);
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 14px;
 font-weight: 700;
 color: white;
 flex-shrink: 0;
 position: relative;
}
.nav-avatar .online-dot {
 width: 10px;
 height: 10px;
 border-radius: 50%;
 background: var(--green);
 border: 1.5px solid var(--navy);
 position: absolute;
 bottom: -1px;
 right: -1px;
 display: none;
}
.nav-avatar .online-dot.show { display: block; }
nav .nav-icon {
 background: none;
 border: none;
 color: white;
 font-size: 22px;
 cursor: pointer;
 padding: 8px;
}
nav .nav-subtitle {
 font-size: 11px;
 color: rgba(255,255,255,0.7);
 margin-top: 1px;
}

/* === CHAT LIST SCREEN === */
#chatListScreen {
 display: flex;
 flex-direction: column;
 height: 100vh;
 padding-top: 60px;
 background: var(--white);
}

/* Search bar */
.search-wrap {
 padding: 10px 16px;
 background: var(--white);
 border-bottom: 1px solid var(--gray-100);
}
.search-bar {
 display: flex;
 align-items: center;
 background: var(--gray-100);
 border-radius: 999px;
 padding: 0 16px;
 height: 40px;
 gap: 8px;
}
.search-bar .si { font-size: 15px; color: var(--gray-400); flex-shrink: 0; }
.search-bar input {
 flex: 1;
 border: none;
 background: transparent;
 font-size: 15px;
 color: var(--gray-700);
 outline: none;
}
.search-bar input::placeholder { color: var(--gray-400); }
.search-bar .clear-btn {
 background: none;
 border: none;
 color: var(--gray-400);
 font-size: 13px;
 cursor: pointer;
 padding: 4px;
 display: none;
}
.search-bar .clear-btn.show { display: block; }

/* Conv list */
.conv-scroll {
 flex: 1;
 overflow-y: auto;
 background: var(--white);
}

.conv-item {
 display: flex;
 align-items: center;
 gap: 12px;
 padding: 12px 16px;
 cursor: pointer;
 transition: background 0.1s;
 background: var(--white);
 position: relative;
}
.conv-item:active { background: var(--gray-50); }

/* Avatar with ring */
.avatar-wrap {
 position: relative;
 flex-shrink: 0;
}
.avatar-wrap .avatar {
 width: 52px;
 height: 52px;
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 font-weight: 700;
 font-size: 17px;
 color: white;
 background: var(--gray-300);
 box-shadow: 0 0 0 2px var(--white), 0 0 0 3.5px var(--gray-200);
}
.avatar-wrap .online-dot {
 width: 12px;
 height: 12px;
 border-radius: 50%;
 background: var(--green);
 border: 2px solid var(--white);
 position: absolute;
 bottom: 1px;
 right: 1px;
}

/* Conv content */
.conv-body { flex: 1; min-width: 0; }
.conv-top {
 display: flex;
 align-items: baseline;
 gap: 8px;
 margin-bottom: 3px;
}
.conv-name {
 font-size: 16px;
 font-weight: 600;
 color: var(--gray-800);
 flex: 1;
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
}
.conv-name.unread { font-weight: 700; color: var(--gray-900); }
.conv-time {
 font-size: 12px;
 color: var(--gray-400);
 flex-shrink: 0;
}
.conv-time.unread { font-weight: 600; color: var(--teal); }
.conv-bottom {
 display: flex;
 align-items: center;
 gap: 6px;
}
.conv-preview {
 font-size: 14px;
 color: var(--gray-500);
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
 flex: 1;
}
.conv-preview.unread { font-weight: 500; color: var(--teal); }
.unread-badge {
 min-width: 20px;
 height: 20px;
 border-radius: 10px;
 background: var(--teal);
 color: white;
 font-size: 11px;
 font-weight: 700;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 0 6px;
 flex-shrink: 0;
}

/* Divider */
.conv-divider {
 height: 1px;
 background: var(--gray-100);
 margin-left: 80px;
}

/* Empty state */
.empty-state {
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 padding: 80px 40px;
 text-align: center;
}
.empty-icon {
 width: 80px;
 height: 80px;
 border-radius: 50%;
 background: var(--gray-100);
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 36px;
 margin-bottom: 16px;
}
.empty-title { font-size: 20px; font-weight: 600; color: var(--gray-700); margin-bottom: 8px; }
.empty-sub { font-size: 15px; color: var(--gray-500); line-height: 1.5; }

/* === CHAT SCREEN === */
#chatScreen {
 display: none;
 flex-direction: column;
 height: 100vh;
 padding-top: 60px;
 background: var(--chat-bg);
}

/* Chat messages area */
.chat-msgs {
 flex: 1;
 overflow-y: auto;
 padding: 8px 16px;
 display: flex;
 flex-direction: column;
 gap: 2px;
}

/* Date separator */
.date-sep {
 text-align: center;
 margin: 12px 0;
}
.date-sep span {
 background: var(--white);
 color: var(--gray-500);
 font-size: 12px;
 font-weight: 600;
 padding: 4px 14px;
 border-radius: 999px;
}

/* Bubbles */
.bubble-row {
 display: flex;
 margin: 1px 0;
}
.bubble-row.sent { justify-content: flex-end; }
.bubble-row.received { justify-content: flex-start; }

.bubble {
 max-width: 75%;
 padding: 8px 12px;
 border-radius: 4px;
 font-size: 14.5px;
 line-height: 1.45;
 position: relative;
}
.bubble.received {
 background: var(--white);
 color: var(--gray-800);
 border-bottom-left-radius: 16px;
 border-bottom-right-radius: 16px;
 border-top-right-radius: 16px;
}
.bubble.sent {
 background: var(--teal);
 color: white;
 border-bottom-left-radius: 16px;
 border-bottom-right-radius: 16px;
 border-top-left-radius: 16px;
}
.bubble-meta {
 display: flex;
 align-items: center;
 justify-content: flex-end;
 gap: 3px;
 margin-top: 2px;
 padding: 0 2px;
}
.bubble-time {
 font-size: 11px;
 color: var(--gray-400);
}
.bubble.sent .bubble-time { color: rgba(255,255,255,0.65); }
.bubble-status { font-size: 14px; line-height: 1; }
.bubble-status.sent-ok { color: var(--gray-400); }
.bubble-status.sent-read { color: var(--gold); }
.bubble-status.sent-err { color: var(--red); }

/* === INPUT BAR === */
.input-bar {
 display: flex;
 align-items: center;
 gap: 8px;
 padding: 8px 12px;
 background: var(--white);
 border-top: 1px solid var(--gray-200);
}
.input-bar .attach-btn,
.input-bar .voice-btn {
 width: 40px;
 height: 40px;
 border-radius: 50%;
 background: none;
 border: none;
 font-size: 20px;
 color: var(--gray-500);
 cursor: pointer;
 display: flex;
 align-items: center;
 justify-content: center;
 flex-shrink: 0;
}
.input-bar .voice-btn { display: none; }
.input-bar .voice-btn.show { display: flex; }
.input-bar .send-btn {
 width: 40px;
 height: 40px;
 border-radius: 50%;
 background: var(--teal);
 border: none;
 font-size: 18px;
 color: white;
 cursor: pointer;
 display: flex;
 align-items: center;
 justify-content: center;
 flex-shrink: 0;
}
.input-bar .send-btn.hide { display: none; }
.msg-input-wrap {
 flex: 1;
 display: flex;
 align-items: center;
 background: var(--gray-100);
 border-radius: 999px;
 padding: 0 14px;
 min-height: 40px;
}
.msg-input {
 flex: 1;
 border: none;
 background: transparent;
 font-size: 15px;
 color: var(--gray-800);
 outline: none;
 padding: 8px 0;
 resize: none;
 field-size: none;
 max-height: 120px;
}
.msg-input::placeholder { color: var(--gray-400); }

/* === RESPONSIVE === */
@media (max-width: 600px) {
 .conv-item { padding: 11px 14px; }
 .avatar-wrap .avatar { width: 48px; height: 48px; font-size: 15px; }
 .conv-divider { margin-left: 72px; }
}
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav id="mainNav">
 <button class="back-btn" id="backBtn" onclick="showConvList()">&#8249;</button>
 <div class="nav-avatar" id="navAvatar">
  <span id="navInitials">MC</span>
  <div class="online-dot" id="navOnlineDot"></div>
 </div>
 <div class="nav-title" id="navTitle">Messages</div>
 <div class="nav-subtitle" id="navSubtitle"></div>
 <button class="nav-icon" id="navMenu">&#8942;</button>
</nav>

<!-- ── CHAT LIST ── -->
<div id="chatListScreen">
 <div class="search-wrap">
  <div class="search-bar">
   <span class="si">&#128269;</span>
   <input type="text" id="convSearchInput" placeholder="Search conversations..." oninput="filterConvs()" autocomplete="off">
   <button class="clear-btn" id="convClearBtn" onclick="clearConvSearch()">&#10005;</button>
  </div>
 </div>
 <div class="conv-scroll" id="convScroll">
  <!-- populated by JS -->
 </div>
</div>

<!-- ── CHAT SCREEN ── -->
<div id="chatScreen">
 <div class="chat-msgs" id="chatMsgs">
  <!-- populated by JS -->
 </div>
 <div class="input-bar">
  <button class="attach-btn">&#128206;</button>
  <div class="msg-input-wrap">
   <textarea class="msg-input" id="msgInput" placeholder="Type a message..." rows="1" oninput="autoResize(this); toggleSendBtn()"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">&#8593;</button>
  <button class="voice-btn" id="voiceBtn">&#127908;</button>
 </div>
</div>

<script>
/* ── DATA ── */
const CURRENT_USER = 'me';
const ROLE = 'teacher'; // 'parent' or 'teacher'

const CONVERSATIONS = [
 {
  id: 'conv-1',
  name: 'Ms. Chan',
  initials: 'MC',
  color: '#008C72',
  lastMessage: 'Thanks for the lesson today!',
  timestamp: new Date(Date.now() - 1000 * 60 * 30),
  unreadCount: 2,
  isOnline: true,
  msgs: [
   { id: 'm1', content: 'Hi! How was the lesson today?', senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 2), status: 'read' },
   { id: 'm2', content: 'It was great! David really understood the algebra finally.', senderId: 'me', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 2 + 1000 * 60 * 2), status: 'read' },
   { id: 'm3', content: "That's wonderful to hear! Should we book the same time next week?", senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60), status: 'read' },
   { id: 'm4', content: 'Yes please! Same time works perfectly.', senderId: 'me', timestamp: new Date(Date.now() - 1000 * 60 * 30), status: 'read' },
   { id: 'm5', content: "Perfect. I'll send you a booking request shortly.", senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 15), status: 'delivered' },
  ]
 },
 {
  id: 'conv-2',
  name: 'David (Math)',
  initials: 'DV',
  color: '#3b82f6',
  lastMessage: 'Can we reschedule to Friday?',
  timestamp: new Date(Date.now() - 1000 * 60 * 60 * 24),
  unreadCount: 0,
  isOnline: false,
  msgs: [
   { id: 'm1', content: 'Hi Ms. Chan, can we reschedule our Thursday lesson?', senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 26), status: 'read' },
   { id: 'm2', content: 'Sure! Is Friday at 4pm okay?', senderId: 'me', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 25), status: 'read' },
   { id: 'm3', content: 'Can we reschedule to Friday?', senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 24), status: 'read' },
  ]
 },
 {
  id: 'conv-3',
  name: 'Teacher: Li Wei',
  initials: 'LW',
  color: '#8b5cf6',
  lastMessage: 'Your booking is confirmed ✓✓',
  timestamp: new Date(Date.now() - 1000 * 60 * 60 * 48),
  unreadCount: 0,
  isOnline: true,
  msgs: [
   { id: 'm1', content: 'Hi, I would like to book a lesson.', senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 50), status: 'read' },
   { id: 'm2', content: 'Sure! Which subject and time works for you?', senderId: 'me', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 49), status: 'read' },
   { id: 'm3', content: 'Your booking is confirmed ✓✓', senderId: 'me', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 48), status: 'read' },
  ]
 },
 {
  id: 'conv-4',
  name: 'Emma (English)',
  initials: 'EM',
  color: '#F9A828',
  lastMessage: 'See you tomorrow!',
  timestamp: new Date(Date.now() - 1000 * 60 * 60 * 24 * 5),
  unreadCount: 0,
  isOnline: false,
  msgs: [
   { id: 'm1', content: 'Hi Emma, ready for your lesson tomorrow?', senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 24 * 6), status: 'read' },
   { id: 'm2', content: 'See you tomorrow!', senderId: 'teacher-1', timestamp: new Date(Date.now() - 1000 * 60 * 60 * 24 * 5), status: 'read' },
  ]
 },
];

/* ── HELPERS ── */
function formatTime(date) {
 const now = new Date();
 const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));
 if (diff === 0) return date.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
 if (diff === 1) return 'Yesterday';
 if (diff < 7) return date.toLocaleDateString('en', { weekday: 'short' });
 return date.toLocaleDateString('en', { month: 'short', day: 'numeric' });
}

function formatMsgTime(date) {
 return date.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
}

function formatDateSep(date) {
 const now = new Date();
 const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));
 if (diff === 0) return 'Today';
 if (diff === 1) return 'Yesterday';
 return date.toLocaleDateString('en', { month: 'long', day: 'numeric' });
}

function getReceiptIcon(status) {
 if (status === 'sending') return '<span class="bubble-status sent-ok">&#10003;</span>';
 if (status === 'sent') return '<span class="bubble-status sent-ok">&#10003;&#10003;</span>';
 if (status === 'delivered') return '<span class="bubble-status sent-ok">&#10003;&#10003;</span>';
 if (status === 'read') return '<span class="bubble-status sent-read">&#10003;&#10003;</span>';
 if (status === 'failed') return '<span class="bubble-status sent-err">&#10007;</span>';
 return '';
}

function getInitials(name) {
 return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

/* ── RENDER CONV LIST ── */
function renderConvList() {
 const scroll = document.getElementById('convScroll');
 const query = document.getElementById('convSearchInput').value.toLowerCase();
 const clearBtn = document.getElementById('convClearBtn');
 clearBtn.classList.toggle('show', query.length > 0);

 const filtered = CONVERSATIONS.filter(c => c.name.toLowerCase().includes(query));

 if (filtered.length === 0) {
  scroll.innerHTML = `
   <div class="empty-state">
    <div class="empty-icon">&#128172;</div>
    <div class="empty-title">No conversations yet</div>
    <div class="empty-sub">Start chatting with your teachers</div>
   </div>`;
  return;
 }

 let html = '';
 filtered.forEach((conv, idx) => {
  const unread = conv.unreadCount > 0;
  const online = conv.isOnline;
  html += `
   <div class="conv-item" onclick="openChat('${conv.id}')">
    <div class="avatar-wrap">
     <div class="avatar" style="background:${conv.color}">${conv.initials}</div>
     <div class="online-dot${online ? '' : '" style="display:none'}"></div>
    </div>
    <div class="conv-body">
     <div class="conv-top">
      <span class="conv-name${unread ? ' unread' : ''}">${conv.name}</span>
      <span class="conv-time${unread ? ' unread' : ''}">${formatTime(conv.timestamp)}</span>
     </div>
     <div class="conv-bottom">
      <span class="conv-preview${unread ? ' unread' : ''}">${conv.lastMessage}</span>
      ${unread ? `<div class="unread-badge">${conv.unreadCount > 9 ? '9+' : conv.unreadCount}</div>` : ''}
     </div>
    </div>
   </div>
   <div class="conv-divider"></div>`;
 });
 scroll.innerHTML = html;
}

/* ── FILTER ── */
function filterConvs() { renderConvList(); }
function clearConvSearch() {
 document.getElementById('convSearchInput').value = '';
 renderConvList();
}

/* ── OPEN CHAT ── */
let activeConv = null;

function openChat(convId) {
 activeConv = CONVERSATIONS.find(c => c.id === convId);
 if (!activeConv) return;

 // Update nav
 document.getElementById('navInitials').textContent = activeConv.initials;
 document.getElementById('navTitle').textContent = activeConv.name;
 const dot = document.getElementById('navOnlineDot');
 dot.classList.toggle('show', activeConv.isOnline);
 document.getElementById('navSubtitle').textContent = activeConv.isOnline ? 'online' : '';
 document.getElementById('backBtn').classList.add('visible');

 // Render messages
 renderMessages();

 // Switch screens
 document.getElementById('chatListScreen').style.display = 'none';
 document.getElementById('chatScreen').style.display = 'flex';

 // Focus input
 document.getElementById('msgInput').focus();
}

function renderMessages() {
 if (!activeConv) return;
 const container = document.getElementById('chatMsgs');
 const msgs = activeConv.msgs;
 let html = '';
 let lastDateLabel = '';

 msgs.forEach(msg => {
  const dateLabel = formatDateSep(msg.timestamp);
  if (dateLabel !== lastDateLabel) {
   html += `<div class="date-sep"><span>${dateLabel}</span></div>`;
   lastDateLabel = dateLabel;
  }

  const sent = msg.senderId === CURRENT_USER;
  const receipt = sent ? getReceiptIcon(msg.status) : '';
  html += `
   <div class="bubble-row${sent ? ' sent' : ' received'}">
    <div class="bubble${sent ? ' sent' : ' received'}">
     ${msg.content}
     <div class="bubble-meta">
      <span class="bubble-time">${formatMsgTime(msg.timestamp)}</span>
      ${receipt}
     </div>
    </div>
   </div>`;
 });

 container.innerHTML = html;
 container.scrollTop = container.scrollHeight;
}

/* ── SEND MESSAGE ── */
function sendMsg() {
 const input = document.getElementById('msgInput');
 const text = input.value.trim();
 if (!text || !activeConv) return;

 const msg = {
  id: 'm' + Date.now(),
  content: text,
  senderId: CURRENT_USER,
  timestamp: new Date(),
  status: 'sending'
 };
 activeConv.msgs.push(msg);
 activeConv.lastMessage = text;
 activeConv.timestamp = new Date();

 renderMessages();

 // Simulate delivery flow
 setTimeout(() => { msg.status = 'sent'; renderMessages(); }, 500);
 setTimeout(() => { msg.status = 'delivered'; renderMessages(); }, 1200);
 setTimeout(() => { msg.status = 'read'; renderMessages(); }, 2500);

 input.value = '';
 autoResize(input);
 toggleSendBtn();
 document.getElementById('msgInput').focus();
}

/* ── INPUT HELPERS ── */
function autoResize(el) {
 el.style.height = 'auto';
 el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSendBtn() {
 const input = document.getElementById('msgInput');
 const sendBtn = document.getElementById('sendBtn');
 const voiceBtn = document.getElementById('voiceBtn');
 const hasText = input.value.trim().length > 0;
 sendBtn.classList.toggle('hide', !hasText);
 voiceBtn.classList.toggle('show', !hasText);
}

/* ── SHOW CONV LIST ── */
function showConvList() {
 activeConv = null;
 document.getElementById('chatListScreen').style.display = 'flex';
 document.getElementById('chatScreen').style.display = 'none';
 document.getElementById('backBtn').classList.remove('visible');
 document.getElementById('navTitle').textContent = 'Messages';
 document.getElementById('navSubtitle').textContent = '';
 document.getElementById('navOnlineDot').classList.remove('show');
 document.getElementById('navInitials').textContent = '';
 renderConvList();
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
 renderConvList();
 toggleSendBtn();
 document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
   e.preventDefault();
   sendMsg();
  }
 });
});
</script>
</body>
</html>
