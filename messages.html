<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — Minerva</title>
<style>
:root {
 --navy: #1e3a5f;
 --teal: #3b82f6;
 --gold: #F9A828;
 --white: #ffffff;
 --gray-100: #f8fafc;
 --gray-200: #e2e8f0;
 --gray-300: #cbd5e1;
 --gray-400: #94a3b8;
 --gray-500: #64748b;
 --gray-600: #475569;
 --gray-700: #334155;
 --green: #22c55e;
 --red: #ef4444;
 --purple: #8b5cf6;
 --navy-dark: #0f1f33;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
 background: #f8fafc;
 color: #334155;
 line-height: 1.6;
 padding-top: 60px;
 min-height: 100vh;
}
a { color: #3b82f6; text-decoration: none; }
/* Nav */
 nav {
 position: fixed;
 top: 0; left: 0; right: 0;
 z-index: 100;
 background: var(--navy);
 padding: 16px 24px;
 }

 .nav-inner {
 max-width: 1100px;
 margin: 0 auto;
 }

 .nav-right {
 display: flex;
 align-items: center;
 justify-content: space-between;
 width: 100%;
 gap: 16px;
 flex-wrap: nowrap;
 }

 .logo {
 display: flex;
 align-items: center;
 gap: 10px;
 font-weight: 800;
 font-size: 22px;
 color: white;
 text-decoration: none;
 white-space: nowrap;
 flex-shrink: 0;
 }

 .logo-icon { width: 36px; height: 36px; }

/* Language Selector */
 .lang-selector { position: relative; display: flex; align-items: center; }

 .globe {
 width: 18px;
 height: 18px;
 color: var(--gold);
 cursor: pointer;
 transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s;
 flex-shrink: 0;
 }
 .globe:hover { transform: rotate(20deg); color: var(--gold-light); }
 .lang-selector.open .globe { transform: rotate(180deg); color: var(--gold); stroke: var(--gold); }

 .lang-dropdown {
 position: absolute;
 top: calc(100% + 8px); left: 50%;
 transform: translateX(-50%) translateY(-10px) scale(0.96);
 width: 64px;
 background: rgba(15, 31, 51, 0.92);
 backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
 border: 1px solid rgba(255,255,255,0.12);
 border-radius: 10px;
 box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(249, 168, 40, 0.08);
 overflow: hidden;
 opacity: 0; visibility: hidden;
 transition: opacity 0.22s, transform 0.22s, visibility 0.22s;
 z-index: 200;
 }
 .lang-selector.open .lang-dropdown { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0) scale(1); }

 .lang-option {
 display: flex;
 align-items: center;
 justify-content: space-between;
 gap: 6px;
 padding: 10px 14px;
 cursor: pointer;
 font-size: 13px;
 font-weight: 600;
 color: rgba(255,255,255,0.65);
 background: transparent;
 border-bottom: 1px solid rgba(255,255,255,0.06);
 transition: background 0.15s, color 0.15s, padding-left 0.15s;
 position: relative;
 overflow: hidden;
 }
 .lang-option:last-child { border-bottom: none; }
 .lang-option:hover { background: rgba(255,255,255,0.06); color: white; padding-left: 18px; }
 .lang-option.selected { color: var(--gold); }
 .lang-selector.open .lang-dropdown .lang-option:nth-child(1) { animation: rowReveal 0.25s 0ms both; }
 .lang-selector.open .lang-dropdown .lang-option:nth-child(2) { animation: rowReveal 0.25s 50ms both; }
 .lang-selector.open .lang-dropdown .lang-option:nth-child(3) { animation: rowReveal 0.25s 100ms both; }
 @keyframes rowReveal { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
 .lang-option .check { width: 14px; height: 14px; flex-shrink: 0; opacity: 0; transform: scale(0.5); transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
 .lang-option.selected .check { opacity: 1; transform: scale(1); }
 .lang-option .check svg { width: 14px; height: 14px; stroke: var(--gold); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 20; stroke-dashoffset: 20; }
 .lang-option.selected .check svg { stroke-dashoffset: 0; transition: stroke-dashoffset 0.3s; }
 .lang-option.selected::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(249,168,40,0.08), transparent); transform: translateX(-100%); transition: transform 0.4s; }
 .lang-option.selected:hover::before { transform: translateX(100%); }

 /* Nav Links */
 .nav-links { display: flex; gap: 24px; align-items: center; }
 .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
 .nav-links a:hover { color: var(--gold); }
 .nav-links a.active { color: var(--gold) !important; }

 .nav-start {
 display: flex;
 align-items: center;
 gap: 0;
 }

 .mobile-menu-btn {
 display: none;
 font-size: 20px;
 cursor: pointer;
 padding: 4px;
 color: var(--gold);
 background: none;
 border: none;
 margin-right: 12px;
 }

 /* User Info */
 .nav-end {
 display: flex;
 align-items: center;
 gap: 16px;
 }

 .user-info {
 display: flex;
 align-items: center;
 gap: 12px;
 }
 .avatar {
 width: 36px;
 height: 36px;
 background: var(--gold);
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 font-weight: 700;
 color: var(--navy-dark);
 font-size: 14px;
 }

 @media (max-width: 768px) {
 .nav-start { display: flex; align-items: center; }
 .mobile-menu-btn { display: flex; }
 .nav-links { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--navy); flex-direction: column; align-items: flex-start; padding: 20px 24px; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 99; }
 .nav-links.active { display: flex; }
 .nav-links a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; }
 .user-info { display: flex; align-items: center; }
 .lang-selector { background: transparent; padding: 0; }
 }
 @media (min-width: 769px) {
 .mobile-menu-btn { display: none; }
 .nav-start { display: flex; align-items: center; }
 }

 
>
