<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — Minerva</title>
<style>
:root {
 --navy: #1e3a5f;
 --teal: #3b82f6;
 --gold: #F9A828;
 --white: #ffffff;
 --gray-100: #f8fafc;
 --gray-200: #e2e8f0;
 --gray-300: #cbd5e1;
 --gray-400: #94a3b8;
 --gray-500: #64748b;
 --gray-600: #475569;
 --gray-700: #334155;
 --green: #22c55e;
 --red: #ef4444;
 --purple: #8b5cf6;
 --navy-dark: #0f1f33;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
 background: #f8fafc;
 color: #334155;
 line-height: 1.6;
 padding-top: 60px;
 min-height: 100vh;
}
a { color: #3b82f6; text-decoration: none; }
/* Nav */
 nav {
 position: fixed;
 top: 0; left: 0; right: 0;
 z-index: 100;
 background: var(--navy);
 padding: 16px 24px;
 }

 .nav-inner {
 max-width: 1100px;
 margin: 0 auto;
 }

 .nav-right {
 display: flex;
 align-items: center;
 justify-content: space-between;
 width: 100%;
 gap: 16px;
 flex-wrap: nowrap;
 }

 .logo {
 display: flex;
 align-items: center;
 gap: 10px;
 font-weight: 800;
 font-size: 22px;
 color: white;
 text-decoration: none;
 white-space: nowrap;
 flex-shrink: 0;
 }

 .logo-icon { width: 36px; height: 36px; }

/* Language Selector */
 .lang-selector { position: relative; display: flex; align-items: center; }

 .globe {
 width: 18px;
 height: 18px;
 color: var(--gold);
 cursor: pointer;
 transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s;
 flex-shrink: 0;
 }
 .globe:hover { transform: rotate(20deg); color: var(--gold-light); }
 .lang-selector.open .globe { transform: rotate(180deg); color: var(--gold); stroke: var(--gold); }

 .lang-dropdown {
 position: absolute;
 top: calc(100% + 8px); left: 50%;
 transform: translateX(-50%) translateY(-10px) scale(0.96);
 width: 64px;
 background: rgba(15, 31, 51, 0.92);
 backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
 border: 1px solid rgba(255,255,255,0.12);
 border-radius: 10px;
 box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(249, 168, 40, 0.08);
 overflow: hidden;
 opacity: 0; visibility: hidden;
 transition: opacity 0.22s, transform 0.22s, visibility 0.22s;
 z-index: 200;
 }
 .lang-selector.open .lang-dropdown { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0) scale(1); }

 .lang-option {
 display: flex;
 align-items: center;
 justify-content: space-between;
 gap: 6px;
 padding: 10px 14px;
 cursor: pointer;
 font-size: 13px;
 font-weight: 600;
 color: rgba(255,255,255,0.65);
 background: transparent;
 border-bottom: 1px solid rgba(255,255,255,0.06);
 transition: background 0.15s, color 0.15s, padding-left 0.15s;
 position: relative;
 overflow: hidden;
 }
 .lang-option:last-child { border-bottom: none; }
 .lang-option:hover { background: rgba(255,255,255,0.06); color: white; padding-left: 18px; }
 .lang-option.selected { color: var(--gold); }
 .lang-selector.open .lang-dropdown .lang-option:nth-child(1) { animation: rowReveal 0.25s 0ms both; }
 .lang-selector.open .lang-dropdown .lang-option:nth-child(2) { animation: rowReveal 0.25s 50ms both; }
 .lang-selector.open .lang-dropdown .lang-option:nth-child(3) { animation: rowReveal 0.25s 100ms both; }
 @keyframes rowReveal { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
 .lang-option .check { width: 14px; height: 14px; flex-shrink: 0; opacity: 0; transform: scale(0.5); transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
 .lang-option.selected .check { opacity: 1; transform: scale(1); }
 .lang-option .check svg { width: 14px; height: 14px; stroke: var(--gold); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 20; stroke-dashoffset: 20; }
 .lang-option.selected .check svg { stroke-dashoffset: 0; transition: stroke-dashoffset 0.3s; }
 .lang-option.selected::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(249,168,40,0.08), transparent); transform: translateX(-100%); transition: transform 0.4s; }
 .lang-option.selected:hover::before { transform: translateX(100%); }

 /* Nav Links */
 .nav-links { display: flex; gap: 24px; align-items: center; }
 .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
 .nav-links a:hover { color: var(--gold); }
 .nav-links a.active { color: var(--gold) !important; }

 .nav-start {
 display: flex;
 align-items: center;
 gap: 0;
 }

 .mobile-menu-btn {
 display: none;
 font-size: 20px;
 cursor: pointer;
 padding: 4px;
 color: var(--gold);
 background: none;
 border: none;
 margin-right: 12px;
 }

 /* User Info */
 .nav-end {
 display: flex;
 align-items: center;
 gap: 16px;
 }

 .user-info {
 display: flex;
 align-items: center;
 gap: 12px;
 }
 .avatar {
 width: 36px;
 height: 36px;
 background: var(--gold);
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 font-weight: 700;
 color: var(--navy-dark);
 font-size: 14px;
 }

 @media (max-width: 768px) {
 .nav-start { display: flex; align-items: center; }
 .mobile-menu-btn { display: flex; }
 .nav-links { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--navy); flex-direction: column; align-items: flex-start; padding: 20px 24px; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 99; }
 .nav-links.active { display: flex; }
 .nav-links a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; }
 .user-info { display: flex; align-items: center; }
 .lang-selector { background: transparent; padding: 0; }
 }
 @media (min-width: 769px) {
 .mobile-menu-btn { display: none; }
 .nav-start { display: flex; align-items: center; }
 }

 
/* === CHAT STYLES === */
#chatListScreen {
 display: flex;
 flex-direction: column;
 background: var(--white);
}

.page-header { margin-bottom: 32px; }
.page-header h1 { font-size: 28px; font-weight: 800; color: #0f1f33; margin-bottom: 4px; }
.dashboard-quote { font-size: 12px; color: #94a3b8; font-style: italic; margin-top: 6px; }

.search-bar {
 display: flex;
 align-items: center;
 background: var(--gray-100);
 border-radius: 999px;
 padding: 0 16px;
 height: 40px;
 gap: 8px;
}
.search-bar .si { font-size: 15px; color: var(--gray-400); flex-shrink: 0; }
.search-bar input {
 flex: 1;
 border: none;
 background: transparent;
 font-size: 15px;
 color: var(--gray-700);
 outline: none;
 padding: 0;
}
.search-bar input::placeholder { color: var(--gray-400); }
.search-bar .clear-btn { background: none; border: none; color: var(--gray-400); font-size: 13px; cursor: pointer; padding: 4px; display: none; }
.search-bar .clear-btn.show { display: block; }
.conv-scroll { flex: 1; overflow-y: auto; background: var(--white); }
.conv-item {
 display: flex;
 align-items: center;
 gap: 12px;
 padding: 12px 16px;
 cursor: pointer;
 transition: background 0.1s;
 background: var(--white);
}
.conv-item:active { background: var(--gray-100); }
.conv-wrap { position: relative; overflow: hidden; }
.conv-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 72px; background: var(--red); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; cursor: pointer; border: none; z-index: 2; transform: translateX(100%); transition: transform 0.2s; }
.conv-delete.show { transform: translateX(0); }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar-wrap .avatar {
 width: 52px;
 height: 52px;
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 font-weight: 700;
 font-size: 17px;
 color: white;
 box-shadow: 0 0 0 2px var(--white), 0 0 0 3.5px var(--gray-200);
}
.avatar-wrap .online-dot {
 width: 12px;
 height: 12px;
 border-radius: 50%;
 background: var(--green);
 border: 2px solid var(--white);
 position: absolute;
 bottom: 1px;
 right: 1px;
}
.conv-body { flex: 1; min-width: 0; }
.conv-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.conv-name { font-size: 16px; font-weight: 600; color: var(--gray-800); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-name.unread { font-weight: 700; color: var(--gray-900); }
.conv-time { font-size: 12px; color: var(--gray-400); flex-shrink: 0; }
.conv-time.unread { font-weight: 600; color: var(--teal); }
.conv-bottom { display: flex; align-items: center; gap: 6px; }
.conv-preview { font-size: 14px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.conv-preview.unread { font-weight: 500; color: var(--teal); }
.unread-badge { min-width: 20px; height: 20px; border-radius: 10px; background: var(--teal); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 6px; flex-shrink: 0; }
.conv-divider { height: 1px; background: var(--gray-200); margin-left: 80px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; }
.empty-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 16px; }
.empty-title { font-size: 20px; font-weight: 600; color: var(--gray-700); margin-bottom: 8px; }
.empty-sub { font-size: 15px; color: var(--gray-500); line-height: 1.5; }

#chatScreen {
 display: none;
 flex-direction: column;
 height: 100vh;
 padding-top: 60px;
 background: #ECE5DD;
}
.chat-msgs { flex: 1; overflow-y: auto; padding: 0 16px 8px; display: flex; flex-direction: column; gap: 2px; }
.date-sep { text-align: center; margin: 6px 0 0; }
.date-sep:first-child { margin-top: 0; }
.date-sep span { background: var(--white); color: var(--gray-500); font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 999px; }
.bubble-row { display: flex; margin: 1px 0; }
.bubble-row.sent { justify-content: flex-end; }
.bubble-row.received { justify-content: flex-start; }
.bubble { max-width: 75%; padding: 8px 12px; border-radius: 4px; font-size: 14.5px; line-height: 1.45; }
.bubble.received { background: var(--white); color: var(--gray-800); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; border-top-right-radius: 16px; }
.bubble.sent { background: var(--teal); color: white; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; border-top-left-radius: 16px; }
.bubble-meta { display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 2px; padding: 0 2px; }
.bubble-time { font-size: 11px; color: var(--gray-400); }
.bubble.sent .bubble-time { color: rgba(255,255,255,0.65); }
.bubble-status { display: flex; align-items: center; line-height: 1; }
.bubble-status.sent-ok { }
.bubble-status.sent-read { }
.bubble-status.sent-err { }
.input-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--white); border-top: 1px solid var(--gray-200); }
.input-bar .attach-btn, .input-bar .voice-btn { width: 40px; height: 40px; border-radius: 50%; background: none; border: none; font-size: 20px; color: var(--gray-500); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.input-bar .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--teal); border: none; font-size: 18px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.input-bar .send-btn.hide { display: none; }
.msg-input-wrap { flex: 1; display: flex; align-items: center; background: var(--gray-100); border-radius: 999px; padding: 0 14px; min-height: 40px; }
.msg-input { flex: 1; border: none; background: transparent; font-size: 15px; color: var(--gray-800); outline: none; padding: 8px 0; resize: none; max-height: 120px; }
.msg-input::placeholder { color: var(--gray-400); }


</style>

</head>

function formatTime(d){var now=new Date(),diff=Math.floor((now-d)/(1000*60*60*24));if(diff===0)return d.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});if(diff===1)return"Yesterday";if(diff<7)return d.toLocaleDateString("en",{weekday:"short"});return d.toLocaleDateString("en",{month:"short",day:"numeric"});}
function formatMsgTime(d){return d.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});}
function formatDateSep(d){var now=new Date(),diff=Math.floor((now-d)/(1000*60*60*24));if(diff===0)return"Today";if(diff===1)return"Yesterday";return d.toLocaleDateString("en",{month:"long",day:"numeric"});}
function getReceiptIcon(s){if(s==="sending")return'<span class="bubble-status sent-ok"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.5 10.5L3 7L2 8L6.5 12.5L14 4.5L13 3.5L6.5 10.5Z" fill="rgba(255,255,255,0.55)"/></svg></span>';if(s==="sent")return'<span class="bubble-status sent-ok"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.5 10.5L3 7L2 8L6.5 12.5L14 4.5L13 3.5L6.5 10.5Z" fill="rgba(255,255,255,0.55)"/></svg></span>';if(s==="delivered")return'<span class="bubble-status sent-ok"><svg width="20" height="12" viewBox="0 0 20 12" fill="none"><path d="M1 6L5 10L11 3" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 6L11 10L19 2" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';if(s==="read")return'<span class="bubble-status sent-read"><svg width="20" height="12" viewBox="0 0 20 12" fill="none"><path d="M1 6L5 10L11 3" stroke="#53bdeb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 6L11 10L19 2" stroke="#53bdeb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';if(s==="failed")return'<span class="bubble-status sent-err"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3L11 11M11 3L3 11" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/></svg></span>';return"";}
function renderConvList(){var s=document.getElementById("convScroll"),q=document.getElementById("convSearchInput").value.toLowerCase();document.getElementById("convClearBtn").className="clear-btn"+(q.length>0?" show":"");var f=CONVERSATIONS.filter(function(c){return c.name.toLowerCase().indexOf(q)!==-1;});if(!f.length){s.innerHTML='<div class="empty-state"><div class="empty-icon">&#128172;</div><div class="empty-title" data-i18n="no_conversations_yet">No conversations yet</div><div class="empty-sub" data-i18n="start_chatting_teachers">Start chatting with your teachers</div></div>';return;}var h="";f.forEach(function(c){var u=c.unreadCount>0;h+=`<div class="conv-wrap" id="wrap-${c.id}"><div class="conv-item" onclick="openChat('${c.id}')" ontouchstart="swipeStart(event,'${c.id}')" ontouchend="swipeEnd(event,'${c.id}')"><div class="avatar-wrap"><div class="avatar" style="background:${c.color}">${c.initials}</div>${c.isOnline?'<div class="online-dot"></div>':""}</div><div class="conv-body"><div class="conv-top"><span class="conv-name${u?" unread":""}">${c.name}</span><span class="conv-time${u?" unread":""}">${formatTime(c.timestamp)}</span></div><div class="conv-bottom"><span class="conv-preview${u?" unread":""}">${c.lastMessage}</span>${u?`<div class="unread-badge">${c.unreadCount>9?"9+":c.unreadCount}</div>`:""}</div></div></div><button class="conv-delete" id="del-${c.id}" onclick="deleteConv('${c.id}')">Delete</button></div><div class="conv-divider"></div>`;});s.innerHTML=h;}
var swipeX={};
function swipeStart(e,id){swipeX[id]=e.changedTouches[0].screenX;}
function swipeEnd(e,id){var dx=e.changedTouches[0].screenX-swipeX[id];if(dx<-60){document.getElementById('del-'+id).classList.add('show');}else{document.getElementById('del-'+id).classList.remove('show');}}
function deleteConv(id){if(!confirm('Delete this conversation?'))return;CONVERSATIONS=CONVERSATIONS.filter(function(c){return c.id!==id;});renderConvList();}
var swipeX={};
function swipeStart(e,id){swipeX[id]=e.changedTouches[0].screenX;}
function swipeEnd(e,id){var dx=e.changedTouches[0].screenX-swipeX[id];if(dx<-60){document.getElementById('del-'+id).classList.add('show');}else{document.getElementById('del-'+id).classList.remove('show');}}
function deleteConv(id){if(!confirm('Delete this conversation?'))return;CONVERSATIONS=CONVERSATIONS.filter(function(c){return c.id!==id;});renderConvList();}
function filterConvs(){renderConvList();}
function clearConvSearch(){document.getElementById("convSearchInput").value="";renderConvList();}
var activeConv=null;
function openChat(id){activeConv=CONVERSATIONS.find(function(c){return c.id===id;});if(!activeConv)return;document.getElementById("leftBackBtn").style.display="block";document.querySelector(".mobile-menu-btn").style.display="none";document.querySelector(".nav-end").style.display="none";document.getElementById("chatNavInfo").style.display="none";renderMessages();document.getElementById("chatListScreen").style.display="none";document.getElementById("chatScreen").style.display="flex";document.querySelector(".nav-links").classList.remove("active");}
function renderMessages(){if(!activeConv)return;var c=document.getElementById("chatMsgs"),html="",lastDate="";activeConv.msgs.forEach(function(m){var ds=formatDateSep(m.timestamp);if(ds!==lastDate){html+='<div class="date-sep"><span>'+ds+"</span></div>";lastDate=ds;}var sent=m.senderId===CURRENT_USER;html+='<div class="bubble-row'+(sent?" sent":" received")+'"><div class="bubble'+(sent?" sent":" received")+'">'+m.content+'<div class="bubble-meta"><span class="bubble-time">'+formatMsgTime(m.timestamp)+"</span>"+(sent?getReceiptIcon(m.status):"")+"</div></div></div>";});c.innerHTML=html;}
function sendMsg(){var i=document.getElementById("msgInput"),t=i.value.trim();if(!t||!activeConv)return;var m={id:"m"+Date.now(),content:t,senderId:CURRENT_USER,timestamp:new Date(),status:"sending"};activeConv.msgs.push(m);activeConv.lastMessage=t;activeConv.timestamp=new Date();renderMessages();setTimeout(function(){m.status="sent";renderMessages();},500);setTimeout(function(){m.status="delivered";renderMessages();},1200);setTimeout(function(){m.status="read";renderMessages();},2500);i.value="";autoResize(i);toggleSendBtn();document.getElementById("msgInput").focus();}
function autoResize(e){e.style.height="auto";e.style.height=Math.min(e.scrollHeight,120)+"px";}
function toggleSendBtn(){var i=document.getElementById("msgInput"),s=document.getElementById("sendBtn"),has=i.value.trim().length>0;s.className="send-btn"+(has?"":" hide");}
function showConvList(){activeConv=null;document.getElementById("chatScreen").style.display="none";document.getElementById("chatListScreen").style.display="flex";document.getElementById("leftBackBtn").style.display="none";document.querySelector(".mobile-menu-btn").style.display="flex";document.querySelector(".nav-end").style.display="flex";renderConvList();}
function showNewChat(){var m=document.getElementById("newChatModal"),l=document.getElementById("studentList");var h="";STUDENTS.forEach(function(s){var ex=CONVERSATIONS.find(function(c){return c.name===s.name;});h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-200);cursor:'+(ex?'default':'pointer')+'" '+(ex?'':'onclick="startChatWith(\''+s.id+'\')"')+'><div style="width:40px;height:40px;border-radius:50%;background:'+s.color+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0;">'+s.initials+'</div><div><div style="font-size:14px;font-weight:600;color:#0f1f33;">'+s.name+'</div>'+(ex?'<div style="font-size:12px;color:var(--gray-400);">Conversation exists</div>':'<div style="font-size:12px;color:var(--gray-400);">Tap to message</div>')+'</div></div>';});l.innerHTML=h||'<div style="text-align:center;color:var(--gray-400);padding:20px;">No students available</div>';m.style.display="flex";}
function closeNewChat(){document.getElementById("newChatModal").style.display="none";}
function startChatWith(id){var s=STUDENTS.find(function(x){return x.id===id;});if(!s)return;var existing=CONVERSATIONS.find(function(c){return c.name===s.name;});if(existing){closeNewChat();openChat(existing.id);}else{var newId="conv-"+Date.now();var newConv={id:newId,name:s.name,initials:s.initials,color:s.color,lastMessage:"",timestamp:new Date(),unreadCount:0,isOnline:s.isOnline,msgs:[]};CONVERSATIONS.unshift(newConv);closeNewChat();renderConvList();openChat(newId);}}
function toggleChatNav(){var n=document.querySelector(".nav-links");n.classList.toggle("active");}
document.addEventListener("DOMContentLoaded",function(){renderConvList();toggleSendBtn();document.getElementById("msgInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});});
</script>
<script src="i18n.js"></script>
<script>
(function(){
  var sel = document.getElementById("langSelector");
  var globe = document.getElementById("langGlobe");
  var dropdown = document.getElementById("langDropdown");
  if (sel && globe && dropdown) {
    globe.addEventListener("click", function(e){ e.stopPropagation(); sel.classList.toggle("open"); });
    document.addEventListener("click", function(){ sel.classList.remove("open"); });
    dropdown.addEventListener("click", function(e){ e.stopPropagation(); });
    dropdown.querySelectorAll(".lang-option").forEach(function(opt){
      opt.addEventListener("click", function(){
        dropdown.querySelectorAll(".lang-option").forEach(function(o){ o.classList.remove("selected"); });
        opt.classList.add("selected");
        sel.classList.remove("open");
        var lang = opt.dataset.lang;
        if (typeof setLanguage === "function") setLanguage(lang);
      });
    });
  }
  var params = new URLSearchParams(window.location.search);
  var lp = params.get("lang");
  if (lp && typeof setLanguage === "function") setLanguage(lp);
})();
</script>
